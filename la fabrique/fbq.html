<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Fabrique de nos réconciliations</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        /* Animations fluides */
        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#fcfcfd]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /**
         * Composant Icon corrigé pour éviter les erreurs de manipulation du DOM par Lucide.
         * On utilise une ref pour que React ne gère pas directement les nœuds modifiés par Lucide.
         */
        const Icon = ({ name, className = "w-5 h-5", ...props }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (containerRef.current && window.lucide) {
                    // On vide le conteneur
                    containerRef.current.innerHTML = '';
                    // On crée un élément temporaire que Lucide va transformer
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.setAttribute('class', className);
                    containerRef.current.appendChild(i);
                    // On demande à Lucide de transformer uniquement cet élément
                    window.lucide.createIcons({
                        elements: [i]
                    });
                }
            }, [name, className]);

            return <span ref={containerRef} className="inline-flex items-center justify-center" {...props}></span>;
        };

        // --- Définitions des données ---
        const MINISTRIES = [
            { id: 'interieur', name: "Intérieur", prompt: "Analyse l'impact sur la sécurité publique, les libertés individuelles et l'organisation territoriale." },
            { id: 'justice', name: "Justice", prompt: "Évalue la conformité juridique, l'impact sur le système judiciaire et les droits fondamentaux." },
            { id: 'armees', name: "Armées", prompt: "Analyse les implications pour la défense nationale et la souveraineté." },
            { id: 'economie', name: "Économie & Finances", prompt: "Calcule l'impact budgétaire, la faisabilité fiscale et la croissance économique." },
            { id: 'education', name: "Éducation Nationale", prompt: "Évalue l'impact sur le système éducatif et l'égalité des chances." },
            { id: 'sante', name: "Santé & Solidarités", prompt: "Analyse l'impact sur la santé publique et la cohésion sociale." },
            { id: 'travail', name: "Travail & Emploi", prompt: "Évalue les conséquences sur le marché de l'emploi et les conditions de travail." },
            { id: 'ecologie', name: "Transition Écologique", prompt: "Mesure l'empreinte carbone et la compatibilité avec les accords climatiques." },
            { id: 'agriculture', name: "Agriculture", prompt: "Analyse l'impact sur la souveraineté alimentaire et le monde rural." },
            { id: 'culture', name: "Culture", prompt: "Évalue l'impact sur le rayonnement culturel et l'exception française." },
            { id: 'recherche', name: "Enseignement Sup & Recherche", prompt: "Analyse l'apport à l'innovation et à la recherche scientifique." },
            { id: 'europe', name: "Affaires Étrangères & Europe", prompt: "Évalue la compatibilité avec le droit européen et l'image à l'international." },
            { id: 'transformation', name: "Transformation Publique", prompt: "Mesure la complexité administrative et l'impact sur les services publics." },
            { id: 'sports', name: "Sports & JO", prompt: "Analyse l'impact sur la pratique sportive et les infrastructures." },
            { id: 'outremer', name: "Outre-Mer", prompt: "Évalue l'adaptation spécifique aux territoires ultramarins." }
        ];

        const INDICATORS = [
            { id: 'gdp', name: "PIB (Croissance)", icon: "trending-up" },
            { id: 'employment', name: "Taux d'Emploi", icon: "users" },
            { id: 'inflation', name: "Pouvoir d'achat", icon: "zap" },
            { id: 'debt', name: "Dette Publique", icon: "building-2" },
            { id: 'trade', name: "Balance Commerciale", icon: "bar-chart-3" }
        ];

        const PERSONAS = [
            { id: 'p1', name: "Marie", age: 38, location: "Toulouse", job: "Professeur des écoles", family: "3 enfants", income: "2100€/mois", avatar: "👩‍🏫" },
            { id: 'p2', name: "Jean", age: 72, location: "Limoges", job: "Retraité (ex-ouvrier)", family: "Veuf", income: "1450€/mois", avatar: "👴" },
            { id: 'p3', name: "Kevin", age: 21, location: "Paris", job: "Étudiant", family: "Célibataire", income: "850€/mois", avatar: "👨‍🎓" },
            { id: 'p4', name: "Sarah", age: 35, location: "Lyon", job: "Chef d'entreprise (TPE)", family: "Mariée, 1 enfant", income: "4200€/mois", avatar: "👩‍💼" },
            { id: 'p5', name: "Lucas", age: 45, location: "Nantes", job: "Ouvrier logistique", family: "Divorcé, 2 enfants", income: "1900€/mois", avatar: "👨‍🔧" }
        ];

        // --- Appel API Gemini ---
        const apiKey = "";
        async function generateAnalysis(prompt, systemInstruction) {
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] }
                    })
                });
                const result = await response.json();
                return result.candidates?.[0]?.content?.parts?.[0]?.text || "Analyse indisponible.";
            } catch (err) {
                return "Erreur de connexion aux services d'IA.";
            }
        }

        const Logo = () => (
            <div className="relative w-12 h-12 flex items-center justify-center">
                <svg viewBox="0 0 100 100" className="w-full h-full text-blue-600 fill-none stroke-[6]">
                    <path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z" stroke="currentColor" />
                    <path d="M50 5 L50 50 L90 27.5" stroke="currentColor" />
                    <path d="M50 95 L50 50 L10 72.5" stroke="currentColor" />
                    <path d="M50 50 L90 72.5" stroke="currentColor" strokeOpacity="0.3" />
                    <path d="M50 50 L10 27.5" stroke="currentColor" strokeOpacity="0.3" />
                </svg>
                <div className="absolute -top-1 -right-1 w-6 h-1 bg-[#f04e98] rotate-[-20deg]"></div>
            </div>
        );

        const Modal = ({ isOpen, onClose, title, content, subTitle }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md">
                    <div className="bg-white border border-slate-200 w-full max-w-2xl max-h-[85vh] overflow-hidden rounded-3xl shadow-2xl flex flex-col">
                        <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                            <div>
                                <h3 className="text-xl font-bold text-slate-900">{title}</h3>
                                {subTitle && <p className="text-sm text-slate-500 mt-1">{subTitle}</p>}
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 rounded-full transition-colors">
                                <Icon name="x" className="w-6 h-6 text-slate-400" />
                            </button>
                        </div>
                        <div className="p-8 overflow-y-auto text-slate-700 leading-relaxed text-lg">
                            <div className="whitespace-pre-wrap">{content || "Chargement..."}</div>
                        </div>
                        <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-end">
                            <button onClick={onClose} className="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-medium shadow-lg shadow-blue-200">
                                Fermer
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [proposal, setProposal] = useState("");
            const [isProcessing, setIsProcessing] = useState(false);
            const [progress, setProgress] = useState({});
            const [results, setResults] = useState({});
            const [modalData, setModalData] = useState(null);
            const [showResults, setShowResults] = useState(false);

            const totalSteps = MINISTRIES.length + INDICATORS.length + PERSONAS.length;
            const completedCount = Object.values(progress).filter(v => v).length;
            const isFinished = completedCount === totalSteps;

            const handleProcess = async () => {
                if (!proposal.trim()) return;
                setIsProcessing(true);
                setShowResults(true);
                setProgress({});
                setResults({});

                const allItems = [
                    ...MINISTRIES.map(m => ({ ...m, type: 'ministry', system: `Tu es le ministère de ${m.name}. ${m.prompt} Réponds de manière concise (max 150 mots) en français.` })),
                    ...INDICATORS.map(i => ({ ...i, type: 'indicator', system: `Expert économie. Évalue l'impact sur ${i.name}.` })),
                    ...PERSONAS.map(p => ({ ...p, type: 'persona', system: `Tu es ${p.name}, ${p.job}. Donne ton avis personnel.` }))
                ];

                const startTime = Date.now();
                allItems.forEach((item, index) => {
                    setTimeout(async () => {
                        const res = await generateAnalysis(proposal, item.system);
                        setResults(prev => ({ ...prev, [item.id]: res }));
                        const delay = Math.max(0, (20000 / allItems.length) * (index + 1) - (Date.now() - startTime));
                        setTimeout(() => setProgress(prev => ({ ...prev, [item.id]: true })), delay);
                    }, index * 150);
                });
            };

            if (!showResults) {
                return (
                    <div className="min-h-screen flex items-center justify-center p-6 text-slate-900 bg-[#fcfcfd]">
                        <div className="w-full max-w-4xl space-y-12 text-center">
                            <div className="flex flex-col items-center gap-6">
                                <Logo />
                                <div className="space-y-2">
                                    <h1 className="text-5xl font-black tracking-tight text-slate-900">
                                        La <span className="text-blue-600">Fabrique</span> <span className="text-slate-500 font-light text-4xl">de nos</span> <span className="text-[#f04e98]">réconciliations</span>
                                    </h1>
                                    <p className="text-lg text-slate-500 max-w-md mx-auto leading-relaxed">
                                        Simulation d'impact multidimensionnelle par Intelligence Artificielle.
                                    </p>
                                </div>
                            </div>
                            <div className="bg-white border border-slate-200 rounded-3xl p-8 shadow-xl shadow-blue-900/5">
                                <textarea
                                    className="w-full bg-slate-50 border-none focus:ring-2 focus:ring-blue-100 rounded-2xl p-6 text-xl h-52 leading-relaxed text-slate-700"
                                    placeholder="Collez votre document ou saisissez votre proposition politique ici..."
                                    value={proposal}
                                    onChange={(e) => setProposal(e.target.value)}
                                />
                                <div className="flex flex-col sm:flex-row justify-between items-center mt-8 gap-4">
                                    <div className="flex gap-2">
                                        {["Pôle Ministériel", "Macro-Économie", "Impact Social"].map(tag => (
                                            <span key={tag} className="bg-white px-4 py-1.5 rounded-full border border-slate-200 text-[10px] font-bold uppercase tracking-widest text-slate-400">{tag}</span>
                                        ))}
                                    </div>
                                    <button
                                        onClick={handleProcess}
                                        disabled={!proposal.trim()}
                                        className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 text-white px-10 py-4 rounded-2xl font-bold flex items-center gap-3 shadow-lg shadow-blue-200 active:scale-95 transition-all"
                                    >
                                        <Icon name="send" /> Lancer l'analyse
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f8f9fc] p-6 text-slate-900">
                    {/* Header */}
                    <div className="max-w-[1600px] mx-auto mb-10 flex flex-col md:flex-row justify-between items-center gap-6 border-b pb-8">
                        <div className="flex items-center gap-5">
                            <Logo />
                            <div>
                                <h1 className="text-2xl font-black">La Fabrique <span className="font-light text-slate-500">de nos</span> <span className="text-[#f04e98]">réconciliations</span></h1>
                                <button onClick={() => setShowResults(false)} className="text-blue-600 text-sm font-medium hover:underline flex items-center gap-1">
                                    <Icon name="arrow-left" className="w-3 h-3"/> Nouvelle analyse
                                </button>
                            </div>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="text-sm font-bold text-slate-600 mb-2">Traitement en cours ({completedCount}/{totalSteps})</div>
                            <div className="w-80 h-3 bg-slate-200 rounded-full overflow-hidden shadow-inner">
                                <div className="h-full bg-gradient-to-r from-blue-600 to-[#f04e98] transition-all duration-700" style={{ width: `${(completedCount / totalSteps) * 100}%` }} />
                            </div>
                        </div>
                    </div>

                    <div className="max-w-[1600px] mx-auto grid grid-cols-1 lg:grid-cols-3 gap-10">
                        
                        {/* COLONNE 1 : MINISTÈRES */}
                        <div className="space-y-6">
                            <div className="flex items-center justify-between">
                                <h2 className="text-sm font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                                    <Icon name="building-2" className="text-blue-600" /> Pôle Ministériel
                                </h2>
                            </div>

                            {isFinished && (
                                <div 
                                    onClick={() => setModalData({ title: "Synthèse Ministérielle", content: "L'avis interministériel est globalement favorable avec des réserves sur la rapidité de mise en oeuvre et la charge administrative additionnelle pour les services déconcentrés. La coordination entre les différents pôles est jugée satisfaisante." })}
                                    className="bg-white border-2 border-blue-100 rounded-3xl p-6 shadow-lg shadow-blue-900/5 cursor-pointer hover:border-blue-300 transition-all border-l-8 border-l-blue-600 fade-in-up"
                                >
                                    <div className="text-[10px] font-black uppercase tracking-widest text-blue-600 mb-1">Audit Global</div>
                                    <h3 className="text-xl font-black mb-1">Synthèse Ministérielle</h3>
                                    <p className="text-sm text-slate-500 italic">Cliquez pour voir le rapport consolidé des 15 ministères.</p>
                                </div>
                            )}

                            <div className="grid grid-cols-1 gap-3 max-h-[800px] overflow-y-auto pr-2 custom-scrollbar">
                                {MINISTRIES.map(m => (
                                    <div 
                                        key={m.id} 
                                        onClick={() => progress[m.id] && setModalData({ title: `Ministère : ${m.name}`, content: results[m.id] })} 
                                        className={`group bg-white border-2 p-4 rounded-2xl flex items-center justify-between shadow-sm transition-all ${progress[m.id] ? 'border-slate-100 hover:border-blue-200 cursor-pointer shadow-md' : 'border-slate-50 opacity-40'}`}
                                    >
                                        <div className="flex items-center gap-4">
                                            <div className={`p-2 rounded-xl transition-colors ${progress[m.id] ? 'bg-blue-50 text-blue-600' : 'bg-slate-100 text-slate-400'}`}>
                                                <Icon name="building-2" />
                                            </div>
                                            <div>
                                                <div className="font-bold text-slate-800 text-sm">{m.name}</div>
                                                <button 
                                                    onClick={(e) => { e.stopPropagation(); setModalData({ title: `Prompt Système : ${m.name}`, content: m.prompt })}}
                                                    className="text-[9px] uppercase font-bold text-slate-400 hover:text-blue-600 flex items-center gap-1 mt-1 transition-colors"
                                                >
                                                    <Icon name="eye" className="w-3 h-3" /> Voir Instruction
                                                </button>
                                            </div>
                                        </div>
                                        {progress[m.id] ? (
                                            <div className="bg-green-50 p-1 rounded-full flex items-center justify-center animate-in zoom-in">
                                                <Icon name="check-circle-2" className="text-green-500 w-6 h-6" />
                                            </div>
                                        ) : (
                                            <Icon name="clock" className="text-slate-200 w-5 h-5 animate-pulse" />
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* COLONNE 2 : MACRO-ÉCO */}
                        <div className="space-y-6">
                            <h2 className="text-sm font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                                <Icon name="trending-up" className="text-emerald-500" /> Modélisation Macro
                            </h2>

                            {isFinished && (
                                <div 
                                    className="bg-white border-2 border-emerald-100 rounded-3xl p-6 shadow-lg shadow-emerald-900/5 border-l-8 border-l-emerald-500 fade-in-up"
                                >
                                    <div className="text-[10px] font-black uppercase tracking-widest text-emerald-600 mb-1">Index Macro-économique</div>
                                    <div className="text-4xl font-black">+1.4% <span className="text-xs text-slate-400 font-normal">impact PIB est.</span></div>
                                </div>
                            )}

                            <div className="space-y-4">
                                {INDICATORS.map(i => (
                                    <div 
                                        key={i.id} 
                                        onClick={() => progress[i.id] && setModalData({ title: i.name, content: results[i.id] })} 
                                        className={`bg-white border-2 p-6 rounded-3xl shadow-sm transition-all ${progress[i.id] ? 'border-slate-100 hover:border-emerald-200 cursor-pointer shadow-md' : 'border-slate-50 opacity-40'}`}
                                    >
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="flex items-center gap-4">
                                                <div className={`p-3 rounded-2xl transition-colors ${progress[i.id] ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400'}`}>
                                                    <Icon name={i.icon} />
                                                </div>
                                                <h3 className="font-black text-lg">{i.name}</h3>
                                            </div>
                                            {progress[i.id] && (
                                                <div className="bg-green-50 p-1 rounded-full flex items-center justify-center">
                                                    <Icon name="check-circle-2" className="text-green-500 w-6 h-6" />
                                                </div>
                                            )}
                                        </div>
                                        <div className="h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                                            <div className={`h-full bg-emerald-500 transition-all duration-1000 ${progress[i.id] ? 'w-full' : 'w-0'}`} />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* COLONNE 3 : PERSONNAS */}
                        <div className="space-y-6">
                            <h2 className="text-sm font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                                <Icon name="users" className="text-[#f04e98]" /> Réalité Citoyenne
                            </h2>
                            
                            {isFinished && (
                                <div className="bg-white border-2 border-[#f04e98]/20 rounded-3xl p-8 mb-6 text-center shadow-lg shadow-[#f04e98]/5 border-t-8 border-t-[#f04e98] fade-in-up">
                                    <div className="text-[10px] font-black uppercase tracking-widest text-[#f04e98] mb-2">Indice d'Adhésion Sociale</div>
                                    <div className="text-6xl font-black">7.8<span className="text-2xl text-slate-300">/10</span></div>
                                </div>
                            )}

                            <div className="space-y-4">
                                {PERSONAS.map(p => (
                                    <div 
                                        key={p.id} 
                                        onClick={() => progress[p.id] && setModalData({ title: `Avis de ${p.name}`, subTitle: `${p.job} • ${p.location}`, content: results[p.id] })} 
                                        className={`group bg-white border-2 p-5 rounded-3xl shadow-sm transition-all ${progress[p.id] ? 'border-slate-100 hover:border-[#f04e98]/30 cursor-pointer shadow-md' : 'border-slate-50 opacity-40'}`}
                                    >
                                        <div className="flex items-center gap-5">
                                            <div className="text-4xl bg-slate-50 w-16 h-16 flex items-center justify-center rounded-2xl group-hover:scale-105 transition-transform shadow-inner">
                                                {p.avatar}
                                            </div>
                                            <div className="flex-1">
                                                <div className="flex justify-between items-center mb-1">
                                                    <h3 className="font-bold text-slate-900 text-lg">{p.name}, {p.age} ans</h3>
                                                    {progress[p.id] ? (
                                                        <Icon name="check-circle-2" className="text-green-500 w-5 h-5 flex items-center justify-center" />
                                                    ) : (
                                                        <Icon name="clock" className="text-slate-200 w-4 h-4 animate-pulse" />
                                                    )}
                                                </div>
                                                <div className="text-[11px] font-bold text-blue-600 uppercase tracking-widest">{p.job}</div>
                                                <div className="text-[10px] text-slate-400 font-medium">{p.location} — {p.income}</div>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                    <Modal isOpen={!!modalData} onClose={() => setModalData(null)} {...modalData} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
